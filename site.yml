---
# ============================================================
# site.yml - Playbook principal CrowdSec + PostgreSQL HA
# Noduri: 10.10.100.171 (primary), 10.10.100.172 (replica)
# VIP: 10.10.100.21
# ============================================================

- name: Bootstrap directoare temporare pentru Ansible
  hosts: crowdsec_containers
  gather_facts: no
  become: no
  tasks:
    - name: Creeaza /tmp si /var/tmp inainte de Gathering Facts
      raw: |
        mkdir -p /tmp /var/tmp
        chmod 1777 /tmp /var/tmp
      changed_when: false

- name: Configurare sistem de baza pe toate nodurile
  hosts: crowdsec_containers
  become: yes
  roles:
    - common

- name: Deploy PostgreSQL HA
  hosts: crowdsec_containers
  become: yes
  roles:
    - postgresql

- name: Deploy Keepalived (HA VIP)
  hosts: crowdsec_containers
  become: yes
  roles:
    - keepalived

- name: Deploy CrowdSec
  hosts: crowdsec_containers
  become: yes
  serial: 1
  roles:
    - crowdsec
