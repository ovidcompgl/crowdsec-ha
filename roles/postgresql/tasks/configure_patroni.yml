---
- name: Oprire servicii pentru reset bootstrap (optional)
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - patroni
    - postgresql
  ignore_errors: yes
  when: patroni_force_reinit | bool

- name: Stergere state Raft Patroni (optional)
  file:
    path: /var/lib/patroni/raft
    state: absent
  when: patroni_force_reinit | bool

- name: Stergere PGDATA existent (optional)
  file:
    path: "{{ postgresql_data_dir }}"
    state: absent
  when: patroni_force_reinit | bool

- name: Re-creare director Raft Patroni (optional)
  file:
    path: /var/lib/patroni/raft
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  when: patroni_force_reinit | bool

- name: Re-creare PGDATA gol (optional)
  file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  when: patroni_force_reinit | bool

- name: Configurare patroni.yml
  template:
    src: patroni.yml.j2
    dest: /etc/patroni/patroni.yml
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart patroni

- name: Creare unit systemd pentru Patroni
  template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart patroni

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Pornire si activare Patroni
  systemd:
    name: patroni
    state: started
    enabled: yes

# Verifica daca Patroni porneste corect inainte sa asteptam portul PostgreSQL
- name: Asteptare serviciu Patroni activ
  command: systemctl is-active patroni
  register: patroni_active
  changed_when: false
  failed_when: false
  retries: 24
  delay: 5
  until: patroni_active.stdout == 'active'

- name: Status systemd Patroni (debug la failure)
  command: systemctl status patroni --no-pager -l
  register: patroni_status
  changed_when: false
  failed_when: false
  when: patroni_active.stdout != 'active'

- name: Loguri Patroni (debug la failure)
  command: journalctl -u patroni -n 120 --no-pager
  register: patroni_journal
  changed_when: false
  failed_when: false
  when: patroni_active.stdout != 'active'

- name: Fail explicit daca Patroni nu a pornit
  fail:
    msg: |
      Patroni nu a pornit pe {{ inventory_hostname }}.
      systemctl is-active: {{ patroni_active.stdout | default('n/a') }}

      --- systemctl status patroni ---
      {{ patroni_status.stdout | default('n/a') }}

      --- journalctl -u patroni -n 120 ---
      {{ patroni_journal.stdout | default('n/a') }}
  when: patroni_active.stdout != 'active'

# Asteapta pana PostgreSQL local porneste pe nodul bootstrap
- name: Asteptare PostgreSQL local disponibil
  wait_for:
    host: 127.0.0.1
    port: "{{ postgresql_port }}"
    delay: 5
    timeout: 180
  when: patroni_active.stdout == 'active'

# Creare utilizatori si baza de date o singura data, pe nodul leader Patroni curent
- name: Verificare daca nodul local este leader Patroni
  uri:
    url: "http://127.0.0.1:{{ patroni_api_port }}/leader"
    method: GET
    status_code:
      - 200
      - 503
    return_content: no
  register: patroni_leader_check
  changed_when: false
  failed_when: false

- name: Determinare nod primary PostgreSQL din Patroni
  set_fact:
    patroni_primary_host: "{{ item }}"
  loop: "{{ groups['crowdsec_containers'] }}"
  when: hostvars[item].patroni_leader_check.status | default(0) | int == 200
  run_once: true

- name: Fail daca nu exista nod primary PostgreSQL
  fail:
    msg: >-
      Nu am gasit niciun nod PostgreSQL primary pentru operatiile de creare DB/user.
      Status /leader: {% for host in groups['crowdsec_containers'] %}{{ host }}={{ hostvars[host].patroni_leader_check.status | default('n/a') }} {% endfor %}
      Verifica Patroni: patronictl -c /etc/patroni/patroni.yml list
  when: patroni_primary_host is not defined
  run_once: true

- name: Creare utilizator de replicare
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ postgresql_replication_user }}"
    password: "{{ postgresql_replication_password }}"
    role_attr_flags: "LOGIN,REPLICATION"
    state: present
  run_once: true
  delegate_to: "{{ patroni_primary_host }}"

- name: Creare baza de date CrowdSec
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ postgresql_crowdsec_db }}"
    state: present
  run_once: true
  delegate_to: "{{ patroni_primary_host }}"

- name: Creare utilizator CrowdSec
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ postgresql_crowdsec_user }}"
    password: "{{ postgresql_crowdsec_password }}"
    db: "{{ postgresql_crowdsec_db }}"
    priv: "ALL"
    state: present
  run_once: true
  delegate_to: "{{ patroni_primary_host }}"

- name: Setare owner baza CrowdSec
  become: yes
  become_user: postgres
  postgresql_query:
    db: postgres
    query: "ALTER DATABASE {{ postgresql_crowdsec_db }} OWNER TO {{ postgresql_crowdsec_user }};"
  run_once: true
  delegate_to: "{{ patroni_primary_host }}"

- name: Grant CREATE pe schema public pentru CrowdSec
  become: yes
  become_user: postgres
  postgresql_query:
    db: "{{ postgresql_crowdsec_db }}"
    query: |
      GRANT USAGE, CREATE ON SCHEMA public TO {{ postgresql_crowdsec_user }};
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgresql_crowdsec_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgresql_crowdsec_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgresql_crowdsec_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgresql_crowdsec_user }};
  run_once: true
  delegate_to: "{{ patroni_primary_host }}"
