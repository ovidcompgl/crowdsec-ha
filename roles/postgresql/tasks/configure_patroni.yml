---
- name: Configurare patroni.yml
  template:
    src: patroni.yml.j2
    dest: /etc/patroni/patroni.yml
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart patroni

- name: Creare unit systemd pentru Patroni
  template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart patroni

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Pornire si activare Patroni
  systemd:
    name: patroni
    state: started
    enabled: yes

# Asteapta pana cluster-ul devine healthy (max 3 minute)
- name: Asteptare cluster Patroni healthy
  uri:
    url: "http://127.0.0.1:{{ patroni_api_port }}/health"
    status_code: 200
  register: patroni_health
  until: patroni_health.status == 200
  retries: 36
  delay: 5
  ignore_errors: yes

# Creare utilizatori PostgreSQL doar de pe liderul ales
- name: Detectare lider Patroni
  uri:
    url: "http://127.0.0.1:{{ patroni_api_port }}/leader"
    status_code: [200, 503]
  register: patroni_leader_check
  changed_when: false

- name: Creare utilizator de replicare (doar pe lider)
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ postgresql_replication_user }}"
    password: "{{ postgresql_replication_password }}"
    role_attr_flags: "LOGIN,REPLICATION"
    state: present
  when: patroni_leader_check.status == 200

- name: Creare baza de date CrowdSec (doar pe lider)
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ postgresql_crowdsec_db }}"
    state: present
  when: patroni_leader_check.status == 200

- name: Creare utilizator CrowdSec (doar pe lider)
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ postgresql_crowdsec_user }}"
    password: "{{ postgresql_crowdsec_password }}"
    db: "{{ postgresql_crowdsec_db }}"
    priv: "ALL"
    state: present
  when: patroni_leader_check.status == 200
