---
- name: Oprire servicii CrowdSec inainte de reinstalare fortata
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - crowdsec
    - crowdsec-firewall-bouncer
  failed_when: false
  when: crowdsec_force_reinstall | bool

- name: Purge pachete CrowdSec pentru reinstalare fortata
  apt:
    name:
      - crowdsec
      - crowdsec-firewall-bouncer-iptables
    state: absent
    purge: yes
    autoremove: yes
  when: crowdsec_force_reinstall | bool

- name: Stergere directoare locale CrowdSec pentru reinstalare fortata
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/crowdsec
    - /var/lib/crowdsec
    - /var/log/crowdsec
  when: crowdsec_force_reinstall | bool

- name: Instalare dependinte CrowdSec
  apt:
    name:
      - curl
      - gnupg2
      - apt-transport-https
      - ca-certificates
    state: present
    update_cache: yes

- name: Creare director keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Descarcare cheie GPG CrowdSec
  shell: |
    set -euo pipefail
    curl -fsSL https://packagecloud.io/crowdsec/crowdsec/gpgkey | gpg --dearmor -o /etc/apt/keyrings/crowdsec.gpg
  args:
    creates: /etc/apt/keyrings/crowdsec.gpg
    executable: /bin/bash

- name: Adaugare repository CrowdSec (signed-by)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.gpg] https://packagecloud.io/crowdsec/crowdsec/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
    state: present
    filename: crowdsec

- name: Instalare CrowdSec
  apt:
    name: crowdsec
    state: "{{ (crowdsec_version == 'latest') | ternary('latest', 'present') }}"
    update_cache: yes

- name: Instalare bouncer firewall CrowdSec (cs-firewall-bouncer-iptables)
  apt:
    name: crowdsec-firewall-bouncer-iptables
    state: present
    update_cache: yes
