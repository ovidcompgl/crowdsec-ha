---
- name: Instalare dependinte CrowdSec
  apt:
    name:
      - curl
      - gnupg2
      - apt-transport-https
      - ca-certificates
    state: present
    update_cache: yes

- name: Creare director keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Descarcare cheie GPG CrowdSec
  get_url:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    dest: /etc/apt/keyrings/crowdsec.asc
    mode: '0644'
    force: no

- name: Adaugare repository CrowdSec (signed-by)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
    state: present
    filename: crowdsec

- name: Instalare CrowdSec
  apt:
    name: crowdsec
    state: "{{ crowdsec_version == 'latest' | ternary('latest', 'present') }}"
    update_cache: yes

- name: Instalare bouncer firewall CrowdSec (cs-firewall-bouncer-iptables)
  apt:
    name: crowdsec-firewall-bouncer-iptables
    state: present
    update_cache: yes
